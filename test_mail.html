<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test gửi mail</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .test-mail-box {
            max-width: 650px;
            background: #fff;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        }

        .test-mail-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 14px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 16px;
        }

        .test-result {
            margin-top: 16px;
            padding: 14px;
            border-radius: 12px;
            display: none;
        }

        .test-result.success {
            display: block;
            background: #eaf8ee;
            color: #176a2f;
            border: 1px solid #b6e5c0;
        }

        .test-result.error {
            display: block;
            background: #fdecec;
            color: #b3261e;
            border: 1px solid #f5b5b5;
        }
    </style>
</head>
<body>

<div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
        <h1>Test gửi mail</h1>

        <div class="test-mail-box">
            <h2>Gửi mail test</h2>

            <p class="page-note">
                Trang này chỉ dùng để kiểm tra Gmail trên server Render có gửi được không.
                Không ảnh hưởng danh sách canh back thật.
            </p>

            <input
                type="email"
                id="testEmail"
                placeholder="Nhập email nhận test"
                required
            >

            <input
                type="password"
                id="testSecret"
                placeholder="Nhập mã TEST_MAIL_SECRET"
                required
            >

            <button type="button" class="pink-btn" onclick="sendTestMail()">
                Gửi mail test
            </button>

            <div id="testResult" class="test-result"></div>
        </div>
    </main>
</div>

<script src="api-config.js"></script>
<script>
const API_BASE = window.API_BASE || "http://localhost:3000";

async function sendTestMail() {
    const email = document.getElementById("testEmail").value.trim();
    const secret = document.getElementById("testSecret").value.trim();
    const resultBox = document.getElementById("testResult");

    resultBox.className = "test-result";
    resultBox.innerHTML = "Đang gửi mail test...";
    resultBox.style.display = "block";

    if (!email) {
        resultBox.className = "test-result error";
        resultBox.innerHTML = "Bạn chưa nhập email.";
        return;
    }

    if (!secret) {
        resultBox.className = "test-result error";
        resultBox.innerHTML = "Bạn chưa nhập mã TEST_MAIL_SECRET.";
        return;
    }

    try {
        const response = await fetch(`${API_BASE}/test-mail/send`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                secret
            })
        });

        const data = await response.json();

        if (!data.success) {
            resultBox.className = "test-result error";
            resultBox.innerHTML = data.message || "Gửi mail test thất bại.";
            return;
        }

        resultBox.className = "test-result success";
        resultBox.innerHTML = data.message || "Đã gửi mail test thành công.";
    } catch (error) {
        resultBox.className = "test-result error";
        resultBox.innerHTML = "Không gọi được server Render.";
    }
}
</script>

<script src="script.js"></script>
</body>
</html>
