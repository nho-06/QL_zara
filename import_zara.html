<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Import sản phẩm Zara</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
        <h1>Import sản phẩm Zara</h1>

        <div class="import-box">
            <h2>Dán link sản phẩm Zara</h2>

            <form onsubmit="importZaraProduct(event)">
                <textarea
                    id="zaraUrl"
                    placeholder="Dán link sản phẩm Zara vào đây..."
                    required
                ></textarea>

                <div class="import-actions">
                    <button type="submit" id="importBtn">Import sản phẩm</button>
                    <button type="button" onclick="clearImportForm()">Xóa link</button>
                </div>
            </form>

            <div id="importStatus" class="page-note hidden"></div>
        </div>

        <div id="previewBox" class="preview-box hidden">
            <h2>Sản phẩm vừa import</h2>
            <div id="previewContent"></div>
        </div>
    </main>
</div>

<script src="api-config.js"></script>
<script type="module">
const API_BASE = window.API_BASE || "http://localhost:3000";

import {
    safe,
    moneyEur,
    moneyVnd,
    addOne,
    setOne,
    getAll,
    getDefaultRate,
    now
} from "./utils.js";

window.importZaraProduct = importZaraProduct;
window.clearImportForm = clearImportForm;

function safeNumber(value) {
    if (value === null || value === undefined || value === "") {
        return 0;
    }

    if (typeof value === "number") {
        return isNaN(value) ? 0 : value;
    }

    let text = String(value).trim();

    text = text
        .replace(/\s/g, "")
        .replace("€", "")
        .replace("đ", "");

    if (text.includes(",") && text.includes(".")) {
        text = text.replace(/\./g, "").replace(",", ".");
    } else if (text.includes(",")) {
        text = text.replace(",", ".");
    }

    const number = Number(text);
    return isNaN(number) ? 0 : number;
}

function normalizeSize(size) {
    return String(size || "")
        .trim()
        .toUpperCase()
        .replace(/\s+/g, "");
}

function uniqueSizes(sizes) {
    const order = ["XXS", "XS", "S", "M", "L", "XL", "XXL", "XXXL"];

    const normalized = (sizes || [])
        .map(size => normalizeSize(size))
        .filter(Boolean);

    const result = [];

    for (const size of order) {
        if (normalized.includes(size) && !result.includes(size)) {
            result.push(size);
        }
    }

    normalized.forEach(size => {
        if (!result.includes(size)) {
            result.push(size);
        }
    });

    return result;
}

function normalizeSizeOptions(sizeOptions) {
    if (!Array.isArray(sizeOptions)) {
        return [];
    }

    const map = new Map();

    sizeOptions.forEach(item => {
        if (!item) return;

        const size = normalizeSize(item.size);

        if (!size) return;

        const statusText = String(item.statusText || item.status || "").trim();

        const available =
            item.available === true ||
            /add|few|left|available|thêm|còn/i.test(statusText);

        const soldOut =
            item.available === false ||
            /view similar|similar|sold out|out of stock|hết|coming soon/i.test(statusText);

        map.set(size, {
            size,
            statusText,
            available: available && !soldOut
        });
    });

    return uniqueSizes([...map.keys()]).map(size => map.get(size));
}

function getAvailableSizesFromOptions(sizeOptions) {
    return uniqueSizes(
        (sizeOptions || [])
            .filter(item => item && item.available === true)
            .map(item => item.size)
    );
}

function getSoldOutSizesFromOptions(sizeOptions) {
    return uniqueSizes(
        (sizeOptions || [])
            .filter(item => item && item.available === false)
            .map(item => item.size)
    );
}

function getAllSizesFromProduct(product) {
    if (Array.isArray(product.sizeOptions) && product.sizeOptions.length > 0) {
        return uniqueSizes(product.sizeOptions.map(item => item.size));
    }

    if (product.sizeChart && Array.isArray(product.sizeChart.sizes)) {
        return uniqueSizes(product.sizeChart.sizes);
    }

    if (Array.isArray(product.availableSizes)) {
        return uniqueSizes(product.availableSizes);
    }

    return [];
}

function getValidRate(rate) {
    const value = safeNumber(rate);
    return value > 0 ? value : 31500;
}

function convertEurToVnd(priceEur, rate) {
    return Math.round(safeNumber(priceEur) * getValidRate(rate));
}

function showStatus(message, type = "normal") {
    const box = document.getElementById("importStatus");

    box.classList.remove("hidden");
    box.classList.remove("success-note", "error-note");
    box.innerHTML = message;

    if (type === "success") {
        box.classList.add("success-note");
    }

    if (type === "error") {
        box.classList.add("error-note");
    }
}

function clearImportForm() {
    document.getElementById("zaraUrl").value = "";
    document.getElementById("importStatus").classList.add("hidden");
    document.getElementById("previewBox").classList.add("hidden");
    document.getElementById("previewContent").innerHTML = "";
}

function getCleanProductCode(data, url) {
    const fromData =
        data.productCode ||
        data.reference ||
        data.productId ||
        data.id ||
        "";

    if (fromData) {
        return String(fromData).trim();
    }

    const text = String(url || "");

    const match =
        text.match(/p(\d+)/i) ||
        text.match(/\/(\d+)\.html/i) ||
        text.match(/product\/(\d+)/i);

    if (match && match[1]) {
        return match[1];
    }

    return "ZARA_" + Date.now();
}

function buildProductPayload(scrapedData, url) {
    const productCode = getCleanProductCode(scrapedData, url);

    const rawSizeOptions = normalizeSizeOptions(scrapedData.sizeOptions || []);

    let sizeOptions = rawSizeOptions;

    const sizeChartSizes =
        scrapedData.sizeChart &&
        Array.isArray(scrapedData.sizeChart.sizes)
            ? uniqueSizes(scrapedData.sizeChart.sizes)
            : [];

    const availableSizesFromScraper = uniqueSizes(scrapedData.availableSizes || []);

    if (sizeOptions.length === 0 && sizeChartSizes.length > 0) {
        sizeOptions = sizeChartSizes.map(size => {
            const isAvailable = availableSizesFromScraper.includes(size);

            return {
                size,
                statusText: isAvailable ? "Available" : "Sold out",
                available: isAvailable
            };
        });
    }

    if (sizeOptions.length === 0 && availableSizesFromScraper.length > 0) {
        sizeOptions = availableSizesFromScraper.map(size => {
            return {
                size,
                statusText: "Available",
                available: true
            };
        });
    }

    const availableSizes = getAvailableSizesFromOptions(sizeOptions);
    const soldOutSizes = getSoldOutSizesFromOptions(sizeOptions);
    const allSizes = getAllSizesFromProduct({
        sizeOptions,
        sizeChart: scrapedData.sizeChart,
        availableSizes
    });

    const isOutOfStock =
        scrapedData.isOutOfStock === true ||
        scrapedData.stockStatus === "out_of_stock" ||
        (
            sizeOptions.length > 0 &&
            availableSizes.length === 0
        );

    return {
        id: productCode,
        productCode,
        name: scrapedData.name || scrapedData.title || "Không có tên",
        title: scrapedData.name || scrapedData.title || "Không có tên",
        color: scrapedData.color || "",
        price: safeNumber(scrapedData.price || scrapedData.priceEur || scrapedData.salePriceEur),
        priceEur: safeNumber(scrapedData.price || scrapedData.priceEur || scrapedData.salePriceEur),
        salePriceEur: safeNumber(scrapedData.price || scrapedData.priceEur || scrapedData.salePriceEur),
        imageUrl:
            scrapedData.productOnlyImage ||
            scrapedData.imageUrl ||
            scrapedData.image ||
            scrapedData.modelImage ||
            "",
        image:
            scrapedData.productOnlyImage ||
            scrapedData.imageUrl ||
            scrapedData.image ||
            scrapedData.modelImage ||
            "",
        modelImage: scrapedData.modelImage || "",
        productOnlyImage:
            scrapedData.productOnlyImage ||
            scrapedData.imageUrl ||
            scrapedData.image ||
            "",
        galleryImages: Array.isArray(scrapedData.galleryImages)
            ? scrapedData.galleryImages
            : [],
        productUrl: url,
        url,
        description: scrapedData.description || "",
        availableSizes,
        soldOutSizes,
        allSizes,
        sizeOptions,
        sizeChart: scrapedData.sizeChart || null,
        stockStatus: isOutOfStock ? "out_of_stock" : "in_stock",
        isOutOfStock,
        hasAddButton: scrapedData.hasAddButton === true,
        importedAt: now(),
        updatedAt: now()
    };
}

async function saveCountryAndPrice(product, rate) {
    const countries = await getAll("countries");

    let zaraCountry = countries.find(country => {
        const name = String(country.name || "").toLowerCase();
        const code = String(country.code || "").toLowerCase();

        return name.includes("zara") || code === "eur" || name.includes("euro");
    });

    if (!zaraCountry) {
        zaraCountry = {
            name: "Zara EUR",
            code: "EUR",
            rate: getValidRate(rate),
            createdAt: now(),
            updatedAt: now()
        };

        zaraCountry.id = await addOne("countries", zaraCountry);
    }

    const priceEur = safeNumber(product.priceEur);
    const finalPriceVnd = convertEurToVnd(priceEur, rate);

    const pricePayload = {
        productId: product.id,
        productCode: product.productCode,
        countryId: zaraCountry.id,
        countryName: zaraCountry.name || "Zara EUR",
        currency: "EUR",
        priceEur,
        salePriceEur: priceEur,
        rate: getValidRate(rate),
        finalPriceVnd,
        updatedAt: now()
    };

    await setOne("product_prices", product.id, pricePayload);

    return {
        ...product,
        finalPriceVnd
    };
}

function renderPreview(product) {
    const previewBox = document.getElementById("previewBox");
    const previewContent = document.getElementById("previewContent");

    const availableSizes = product.availableSizes || [];
    const soldOutSizes = product.soldOutSizes || [];
    const allSizes = product.allSizes || [];

    const imageUrl =
        product.productOnlyImage ||
        product.imageUrl ||
        product.image ||
        product.modelImage ||
        "";

    let sizeHtml = "";

    if (allSizes.length > 0) {
        sizeHtml = `
            <div class="size-badges">
                ${allSizes.map(size => {
                    if (availableSizes.includes(size)) {
                        return `<span class="size-badge available-size">${safe(size)}</span>`;
                    }

                    if (soldOutSizes.includes(size)) {
                        return `<span class="size-badge soldout-size">${safe(size)}</span>`;
                    }

                    return `<span class="size-badge unknown-size">${safe(size)}</span>`;
                }).join("")}
            </div>
        `;
    } else {
        sizeHtml = `<p class="soldout-text">Chưa lấy được size.</p>`;
    }

    let sizeChartHtml = "";

    if (
        product.sizeChart &&
        Array.isArray(product.sizeChart.sizes) &&
        Array.isArray(product.sizeChart.rows) &&
        product.sizeChart.rows.length > 0
    ) {
        sizeChartHtml = `
            <div class="size-chart-box">
                <h3>Bảng size ${safe(product.sizeChart.unit || "CM")}</h3>

                <div class="size-table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th>AREA</th>
                                ${product.sizeChart.sizes.map(size => `<th>${safe(size)}</th>`).join("")}
                            </tr>
                        </thead>

                        <tbody>
                            ${product.sizeChart.rows.map(row => `
                                <tr>
                                    <td>${safe(row.area)}</td>
                                    ${product.sizeChart.sizes.map(size => `<td>${safe(row[size] || "")}</td>`).join("")}
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    } else {
        sizeChartHtml = `
            <div class="page-note">
                Chưa lấy được bảng size chi tiết.
            </div>
        `;
    }

    previewContent.innerHTML = `
        <div class="product-card">
            <div class="product-image-wrap">
                ${
                    imageUrl
                        ? `<img src="${safe(imageUrl)}" alt="${safe(product.name)}">`
                        : `<div class="no-image">Không có ảnh</div>`
                }
            </div>

            <div class="product-info">
                <h3>${safe(product.name)}</h3>
                <p><b>ID:</b> ${safe(product.productCode)}</p>
                <p><b>Màu:</b> ${safe(product.color || "")}</p>
                <p><b>Giá EUR:</b> ${product.priceEur ? moneyEur(product.priceEur) : "Chưa có"}</p>
                <p><b>Giá VNĐ:</b> ${product.finalPriceVnd ? moneyVnd(product.finalPriceVnd) : "Chưa có"}</p>

                <p><b>Trạng thái:</b> ${product.isOutOfStock ? "Hết hàng" : "Còn hàng"}</p>

                <p><b>Còn size:</b> ${availableSizes.length ? availableSizes.map(size => safe(size)).join(", ") : "Không còn size nào"}</p>
                <p><b>Hết size:</b> ${soldOutSizes.length ? soldOutSizes.map(size => safe(size)).join(", ") : "Không có"}</p>

                ${sizeHtml}
            </div>
        </div>

        ${sizeChartHtml}
    `;

    previewBox.classList.remove("hidden");
}

async function importZaraProduct(event) {
    event.preventDefault();

    const url = document.getElementById("zaraUrl").value.trim();
    const button = document.getElementById("importBtn");

    if (!url) {
        alert("Bạn chưa dán link Zara.");
        return;
    }

    button.disabled = true;
    button.innerText = "Đang import...";

    showStatus("Đang mở Zara và lấy dữ liệu, vui lòng chờ...");

    try {
        const response = await fetch(`${API_BASE}/scrape-zara`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ url })
        });

        const result = await response.json();

        if (!result.success) {
            showStatus(result.message || "Không lấy được dữ liệu Zara.", "error");
            return;
        }

        const scrapedData = result.data || {};
        const rate = await getDefaultRate();

        let product = buildProductPayload(scrapedData, url);
        product = await saveCountryAndPrice(product, rate);

        await setOne("products", product.id, product);

        const availableSizes = product.availableSizes || [];
        const soldOutSizes = product.soldOutSizes || [];

        showStatus(`
            <b>Import thành công.</b><br>
            ID: ${safe(product.productCode)}<br>
            Còn size: ${availableSizes.length ? availableSizes.map(size => safe(size)).join(", ") : "Không còn size nào"}<br>
            Hết size: ${soldOutSizes.length ? soldOutSizes.map(size => safe(size)).join(", ") : "Không có"}
        `, "success");

        renderPreview(product);
    } catch (error) {
        console.error(error);
        showStatus(
            "Không gọi được server Zara. Hãy mở terminal chạy: <b>cd zara-scraper</b> rồi <b>node server.js</b>",
            "error"
        );
    } finally {
        button.disabled = false;
        button.innerText = "Import sản phẩm";
    }
}
</script>

<script src="script.js"></script>
</body>
</html>
